name: Bug Report
description: Report a bug in Kraken
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Teamserver
        - Operator TUI
        - Implant Core
        - Crypto
        - Database
        - Protocol
        - Build System
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Step-by-step reproduction
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Kraken Version
      placeholder: "0.1.0"
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Ubuntu 22.04 / Windows 11"
  - type: input
    id: rust
    attributes:
      label: Rust Version
      placeholder: "1.75.0"
