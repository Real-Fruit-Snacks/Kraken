[package]
name = "mod-shell"
version = "0.1.0"
edition = "2021"
description = "Kraken shell execution module"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
common = { path = "../../common" }
protocol = { path = "../../protocol", default-features = false, features = ["grpc"] }
prost = "0.12"
tracing = "0.1"

# For timeout handling in sync context
wait-timeout = "0.2"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.52", features = [
    "Win32_Foundation",
    "Win32_System_Threading",
    "Win32_System_Pipes",
    "Win32_Security",
    "Win32_Storage_FileSystem",
    "Win32_System_Console",
] }

[features]
default = []
dynamic-entry = []

[dev-dependencies]
tempfile = "3.10"
