  string os = 2;        // "windows", "linux", "darwin"
  string arch = 3;      // "x64", "x86"
  string format = 4;    // "exe", "dll", "shellcode", "service", "powershell"
  string transport = 5; // "http", "https", "dns", "tcp", "smb"
