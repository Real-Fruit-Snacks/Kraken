// ============================================================================
// Background Jobs (Phase 11)
// ============================================================================

// Job control messages
message JobListRequest {}

message JobListResponse {
  repeated JobInfo jobs = 1;
}

message JobInfo {
  uint32 job_id = 1;
  bytes task_id = 2;
  string description = 3;
  JobStatus status = 4;
  int64 created_at = 5;
  optional int64 completed_at = 6;
  uint32 progress = 7; // 0-100
}

enum JobStatus {
  JOB_STATUS_RUNNING = 0;
  JOB_STATUS_COMPLETED = 1;
  JOB_STATUS_FAILED = 2;
  JOB_STATUS_CANCELLED = 3;
}

message JobKillRequest {
  uint32 job_id = 1;
}

message JobKillResponse {
  bool success = 1;
  string message = 2;
}

message JobOutput {
  uint32 job_id = 1;
  bytes task_id = 2;
  bytes output = 3;
  bool is_final = 4;
  optional JobStatus final_status = 5;
}

message GetJobOutputRequest {
  uint32 job_id = 1;
}

message GetJobOutputResponse {
  repeated bytes output_chunks = 1;
  bool is_complete = 2;
  optional JobStatus final_status = 3;
}

service JobService {
  rpc ListJobs(JobListRequest) returns (JobListResponse);
  rpc KillJob(JobKillRequest) returns (JobKillResponse);
  rpc GetJobOutput(GetJobOutputRequest) returns (GetJobOutputResponse);
}

// ============================================================================
// Audit Service (Phase 12)
// ============================================================================

service AuditService {
  // List audit events with pagination
  rpc ListAuditEvents(ListAuditEventsRequest) returns (ListAuditEventsResponse);

  // Stream audit events in real-time
  rpc StreamAuditEvents(StreamAuditEventsRequest) returns (stream AuditEvent);

  // Verify tamper-evident chain integrity
  rpc VerifyChainIntegrity(VerifyChainIntegrityRequest) returns (VerifyChainIntegrityResponse);
}

message ListAuditEventsRequest {
  uint32 limit = 1;
  uint32 offset = 2;
  string event_type = 3;  // Filter by type (optional)
  bytes operator_id = 4;   // Filter by operator (optional)
}

message ListAuditEventsResponse {
  repeated AuditEvent events = 1;
  uint32 total_count = 2;
}

message StreamAuditEventsRequest {
  string event_type = 1;  // Filter (optional)
}

message AuditEvent {
  bytes event_id = 1;
  string event_type = 2;
  bytes operator_id = 3;
  Timestamp timestamp = 4;
  bytes previous_hash = 5;
  bytes event_hash = 6;
  string details = 7;  // JSON payload
}

message VerifyChainIntegrityRequest {
  uint32 check_last_n = 1;  // Verify last N events (0 = all)
}

message VerifyChainIntegrityResponse {
  bool is_valid = 1;
  string error_message = 2;
  uint32 events_checked = 3;
}
