// ============================================================================
// Proxy Service (Phase 5) - SOCKS Proxy Management
// ============================================================================

enum SocksVersion {
  SOCKS_VERSION_UNSPECIFIED = 0;
  SOCKS_VERSION_4 = 1;
  SOCKS_VERSION_4A = 2;
  SOCKS_VERSION_5 = 3;
}

enum ProxyState {
  PROXY_STATE_UNSPECIFIED = 0;
  PROXY_STATE_STARTING = 1;
  PROXY_STATE_ACTIVE = 2;
  PROXY_STATE_STOPPING = 3;
  PROXY_STATE_STOPPED = 4;
  PROXY_STATE_ERROR = 5;
}

message SocksProxy {
  Uuid id = 1;
  Uuid implant_id = 2;
  string bind_host = 3;
  uint32 bind_port = 4;
  SocksVersion version = 5;
  ProxyState state = 6;
  Timestamp started_at = 7;
  uint64 bytes_in = 8;
  uint64 bytes_out = 9;
  uint32 active_connections = 10;
  uint64 total_connections = 11;
}

message PortForward {
  Uuid id = 1;
  Uuid implant_id = 2;
  string local_host = 3;
  uint32 local_port = 4;
  string remote_host = 5;
  uint32 remote_port = 6;
  bool reverse = 7;             // true = remote->local, false = local->remote
  ProxyState state = 8;
  Timestamp started_at = 9;
  uint64 bytes_in = 10;
  uint64 bytes_out = 11;
}

// Start a SOCKS proxy on an implant
message StartProxyRequest {
  Uuid implant_id = 1;
  string bind_host = 2;         // Default "127.0.0.1"
  uint32 bind_port = 3;         // Default 1080
  SocksVersion version = 4;     // Default SOCKS5
  optional string username = 5; // Optional SOCKS auth
  optional string password = 6;
  bool reverse = 7;             // Reverse mode: implant is exit node
  uint32 connect_timeout = 8;   // Connection timeout in seconds (reverse mode)
  bool allow_dns = 9;           // Allow DNS resolution (reverse mode, default true)
}

message StartProxyResponse {
  Uuid proxy_id = 1;
  Uuid task_id = 2;
}

message StopProxyRequest {
  Uuid proxy_id = 1;
}

message StopProxyResponse {
  bool success = 1;
}

message ListProxiesRequest {
  optional Uuid implant_id = 1;  // Filter by implant
  optional ProxyState state = 2; // Filter by state
}

message ListProxiesResponse {
  repeated SocksProxy proxies = 1;
  repeated PortForward port_forwards = 2;
}

message GetProxyStatsRequest {
  Uuid proxy_id = 1;
}

message ProxyStats {
  Uuid proxy_id = 1;
  uint64 bytes_in = 2;
  uint64 bytes_out = 3;
  uint32 active_connections = 4;
  uint64 total_connections = 5;
  repeated ProxyConnection connections = 6;
}

message ProxyConnection {
  uint32 connection_id = 1;
  string remote_addr = 2;
  string target_addr = 3;
  uint64 bytes_in = 4;
  uint64 bytes_out = 5;
  Timestamp connected_at = 6;
}

message StreamProxyStatsRequest {
  optional Uuid proxy_id = 1;   // Filter by proxy, or all
  uint32 interval_ms = 2;       // Update interval (default 1000)
}

message ProxyStatsUpdate {
  Uuid proxy_id = 1;
  uint64 bytes_in = 2;
  uint64 bytes_out = 3;
  uint32 active_connections = 4;
  Timestamp timestamp = 5;
}

// Port forwarding
message StartPortForwardRequest {
  Uuid implant_id = 1;
  string local_host = 2;
  uint32 local_port = 3;
  string remote_host = 4;
  uint32 remote_port = 5;
  bool reverse = 6;
}

message StartPortForwardResponse {
  Uuid forward_id = 1;
  Uuid task_id = 2;
}

message StopPortForwardRequest {
  Uuid forward_id = 1;
}

message StopPortForwardResponse {
  bool success = 1;
}

// Reverse SOCKS proxy channel messages (implant as exit node)
message ReverseProxyConnect {
  uint32 channel_id = 1;        // Unique channel ID for this connection
  string target_host = 2;       // Target hostname or IP
  uint32 target_port = 3;       // Target port
}

message ReverseProxyConnectResult {
  uint32 channel_id = 1;
  bool success = 2;
  optional string error = 3;
  optional string bound_addr = 4;  // Local address implant bound to
}

message ReverseProxyData {
  uint32 channel_id = 1;
  bytes data = 2;
  bool eof = 3;                 // End of stream marker
}

message ReverseProxyClose {
  uint32 channel_id = 1;
}

service ProxyService {
  // SOCKS Proxy management
  rpc StartProxy(StartProxyRequest) returns (StartProxyResponse);
  rpc StopProxy(StopProxyRequest) returns (StopProxyResponse);
  rpc ListProxies(ListProxiesRequest) returns (ListProxiesResponse);
  rpc GetProxyStats(GetProxyStatsRequest) returns (ProxyStats);
  rpc StreamProxyStats(StreamProxyStatsRequest) returns (stream ProxyStatsUpdate);

  // Port forwarding
  rpc StartPortForward(StartPortForwardRequest) returns (StartPortForwardResponse);
  rpc StopPortForward(StopPortForwardRequest) returns (StopPortForwardResponse);
}

// ============================================================================
// BOF Service (Phase 5) - Beacon Object File Management
// ============================================================================

enum BOFCategory {
  BOF_CATEGORY_UNSPECIFIED = 0;
  BOF_CATEGORY_RECON = 1;
  BOF_CATEGORY_CREDENTIALS = 2;
  BOF_CATEGORY_LATERAL = 3;
  BOF_CATEGORY_PRIVESC = 4;
  BOF_CATEGORY_EVASION = 5;
  BOF_CATEGORY_PERSISTENCE = 6;
  BOF_CATEGORY_UTILITY = 7;
}

enum BOFArgType {
  BOF_ARG_UNSPECIFIED = 0;
  BOF_ARG_STRING = 1;      // z - null-terminated string
  BOF_ARG_WSTRING = 2;     // Z - wide string
  BOF_ARG_INT = 3;         // i - 32-bit integer
  BOF_ARG_SHORT = 4;       // s - 16-bit integer
  BOF_ARG_BINARY = 5;      // b - binary data with length prefix
}

message BOFArgument {
  string name = 1;
  BOFArgType arg_type = 2;
  string description = 3;
  bool required = 4;
  optional string default_value = 5;
}

message BOFManifest {
  string id = 1;
  string name = 2;
  string description = 3;
  string author = 4;
  string version = 5;
  BOFCategory category = 6;
  repeated string tags = 7;
  repeated BOFArgument arguments = 8;
  string entry_point = 9;           // Default "go"
  repeated string supported_arch = 10;  // "x64", "x86"
  repeated string supported_os = 11;    // "windows"
  string opsec_notes = 12;          // OPSEC considerations
  string source_url = 13;           // Original source repo
}

message BOFCatalogEntry {
  BOFManifest manifest = 1;
  bool x64_available = 2;
  bool x86_available = 3;
  uint64 x64_size = 4;
  uint64 x86_size = 5;
  Timestamp added_at = 6;
}

message BOFExecution {
  Uuid id = 1;
  Uuid implant_id = 2;
  string bof_id = 3;
  repeated string arguments = 4;
  Timestamp executed_at = 5;
  optional string output = 6;
  optional int32 exit_code = 7;
  optional string error = 8;
  bool completed = 9;
}

// List available BOFs in the catalog
message ListBOFsRequest {
  optional BOFCategory category = 1;
  optional string search = 2;       // Search name/description
  repeated string tags = 3;
}

message ListBOFsResponse {
  repeated BOFCatalogEntry bofs = 1;
}

// Get BOF details
message GetBOFRequest {
  string bof_id = 1;
}

// Execute BOF on implant
message ExecuteBOFRequest {
  Uuid implant_id = 1;
  string bof_id = 2;
  repeated string arguments = 3;    // Arguments in order
  optional string arch_override = 4; // Force x64 or x86
}

message ExecuteBOFResponse {
  Uuid execution_id = 1;
  Uuid task_id = 2;
}

// Validate BOF compatibility with implant
message ValidateBOFRequest {
  Uuid implant_id = 1;
  string bof_id = 2;
}

message ValidateBOFResponse {
  bool compatible = 1;
  repeated string warnings = 2;     // OPSEC warnings
  string recommended_arch = 3;
}

// List recent BOF executions
message ListBOFExecutionsRequest {
  optional Uuid implant_id = 1;
  optional string bof_id = 2;
  uint32 limit = 3;
}

message ListBOFExecutionsResponse {
  repeated BOFExecution executions = 1;
}

// Upload new BOF to catalog
message UploadBOFRequest {
  BOFManifest manifest = 1;
  optional bytes x64_data = 2;
  optional bytes x86_data = 3;
}

message UploadBOFResponse {
  string bof_id = 1;
  bool success = 2;
  optional string error = 3;
}

// Delete BOF from catalog
message DeleteBOFRequest {
  string bof_id = 1;
}

message DeleteBOFResponse {
  bool success = 1;
}

service BOFService {
  // Catalog management
  rpc ListBOFs(ListBOFsRequest) returns (ListBOFsResponse);
  rpc GetBOF(GetBOFRequest) returns (BOFCatalogEntry);
  rpc UploadBOF(UploadBOFRequest) returns (UploadBOFResponse);
  rpc DeleteBOF(DeleteBOFRequest) returns (DeleteBOFResponse);

  // Execution
  rpc ExecuteBOF(ExecuteBOFRequest) returns (ExecuteBOFResponse);
  rpc ValidateBOF(ValidateBOFRequest) returns (ValidateBOFResponse);
  rpc ListExecutions(ListBOFExecutionsRequest) returns (ListBOFExecutionsResponse);
}

